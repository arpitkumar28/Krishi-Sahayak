name: krishi_sahayak
description: "A professional agriculture assistance app with AI disease detection."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  go_router: ^13.1.0
  json_annotation: ^4.8.1
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  intl: ^0.18.1
  sqflite: ^2.3.0
  path: ^1.8.3
  google_generative_ai: ^0.4.5
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
    - assets/
    - .env
